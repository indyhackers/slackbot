# yaml-language-server: $schema=https://raw.githubusercontent.com/slackapi/manifest-schema/main/manifest.schema.json

display_information:
  name: Indy Hackers
  description: Community automation for the Indy Hackers Slack workspace
  background_color: "#24292f"
features:
  app_home:
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Indy Hackers
    always_online: false
  slash_commands:
    - command: /onboarding
      description: start or stop your Indy Hackers onboarding
      should_escape: false
      usage_hint: start | stop
oauth_config:
  scopes:
    bot:
      - chat:write
      - commands
      - im:write
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - team_join
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
