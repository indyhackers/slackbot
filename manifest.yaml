display_information:
  name: Indy Hackers
  description: Community automation for the Indy Hackers Slack workspace
  background_color: "#24292f"
features:
  bot_user:
    display_name: Indy Hackers
    always_online: false
  slash_commands:
    - command: /onboarding
      description: stop your Indy Hackers onboarding
      should_escape: false
      usage_hint: stop
oauth_config:
  scopes:
    bot:
      - chat:write
      - commands
      - im:write
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - team_join
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
